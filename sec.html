<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Secure Developer & Engineer — Cybersecurity 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"] {
  --bg: #060c1a;
  --surface: #0c1428;
  --surface2: #111e38;
  --surface3: #1a2a48;
  --border: rgba(100,180,255,.07);
  --border2: rgba(100,180,255,.15);
  --text: #e8f4ff;
  --text-sub: rgba(232,244,255,.75);
  --text-muted: rgba(232,244,255,.38);
  --blue: #60a5fa;
  --blue-glow: rgba(96,165,250,.2);
  --gold: #fbbf24;
  --teal: #34d399;
  --lilac: #a78bfa;
  --red: #f87171;
  --nav-bg: rgba(6,12,26,.92);
  --card-shadow: 0 0 0 1px rgba(100,180,255,.1), 0 32px 80px rgba(20,60,180,.25);
  --tag-bg: rgba(96,165,250,.1);
  --tag-border: rgba(96,165,250,.3);
  --photo-bg: #111e38;
  --photo-border: rgba(100,180,255,.2);
}
:root[data-theme="light"] {
  --bg: #f0f6ff;
  --surface: #fff;
  --surface2: #e4efff;
  --surface3: #d0e4ff;
  --border: rgba(20,60,180,.08);
  --border2: rgba(20,60,180,.18);
  --text: #06101e;
  --text-sub: #1a2840;
  --text-muted: rgba(6,16,30,.45);
  --blue: #1d4ed8;
  --blue-glow: rgba(29,78,216,.12);
  --gold: #b45309;
  --teal: #0f766e;
  --lilac: #6d28d9;
  --red: #dc2626;
  --nav-bg: rgba(240,246,255,.94);
  --card-shadow: 0 0 0 1px rgba(20,60,180,.1), 0 16px 50px rgba(20,60,180,.1);
  --tag-bg: rgba(29,78,216,.08);
  --tag-border: rgba(29,78,216,.25);
  --photo-bg: #d0e4ff;
  --photo-border: rgba(29,78,216,.25);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;transition:background .4s,color .4s}

#cv{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}
[data-theme="light"] #cv{opacity:.05}

#prog{position:fixed;top:0;left:0;height:2px;z-index:300;background:linear-gradient(90deg,var(--blue),var(--teal),var(--gold));transition:width .6s cubic-bezier(.4,0,.2,1)}

#top{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;background:var(--bg);border-bottom:1px solid var(--border);z-index:200;backdrop-filter:blur(14px)}
#top-l{font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted)}
#top-r{display:flex;align-items:center;gap:.8rem}
#sc{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text-muted)}
#sc b{color:var(--blue)}

.icon-btn{width:27px;height:27px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.icon-btn:hover{background:var(--surface3);border-color:var(--blue)}
.icon-btn svg{width:13px;height:13px;stroke:var(--text-muted);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.icon-btn:hover svg{stroke:var(--blue)}
.ic-compress{display:none}

#tog{width:36px;height:19px;border-radius:999px;background:var(--surface2);border:1px solid var(--border2);cursor:pointer;position:relative;flex-shrink:0}
#tog::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--blue);transition:transform .3s cubic-bezier(.4,0,.2,1)}
[data-theme="light"] #tog::after{transform:translateX(17px)}

.nz{position:fixed;top:44px;bottom:44px;width:9%;z-index:180;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .25s}
.nz:hover{opacity:1}
.nz.L{left:0}
.nz.R{right:0}
.arr{width:42px;height:42px;border-radius:50%;background:var(--nav-bg);border:1px solid var(--border2);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:1rem;transition:transform .2s}
.nz.L:hover .arr{transform:translateX(-4px)}
.nz.R:hover .arr{transform:translateX(4px)}
@media(hover:none){.nz{opacity:.22;width:13%}.arr{width:36px;height:36px}}

#sw{position:fixed;top:44px;bottom:44px;left:0;right:0;overflow:hidden}

.slide{position:absolute;inset:0;display:flex;align-items:stretch;justify-content:center;padding:.6rem 2.5%;opacity:0;transform:translateY(24px) scale(.975);pointer-events:none;transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1);z-index:1}
.slide.active{opacity:1;transform:none;pointer-events:all;z-index:2}
.slide.out{opacity:0;transform:translateY(-24px) scale(.975);pointer-events:none}

.card{width:100%;max-width:1240px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;position:relative;overflow:hidden;box-shadow:var(--card-shadow);display:flex;flex-direction:column;flex:1;min-height:0}

.tag{display:inline-flex;align-items:center;padding:.25rem .8rem;border-radius:999px;background:var(--tag-bg);border:1px solid var(--tag-border);font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);width:fit-content;flex-shrink:0}
.stitle{font-family:'Cormorant Garamond',serif;font-weight:700;line-height:1.1;color:var(--text)}
.divider{height:1px;background:linear-gradient(90deg,var(--blue),transparent);opacity:.28;margin:.5rem 0 1rem;max-width:160px}

#bot{position:fixed;bottom:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:center;gap:.7rem;background:var(--bg);border-top:1px solid var(--border);z-index:200;backdrop-filter:blur(14px)}
.nb{width:34px;height:30px;border-radius:7px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.nb:hover{background:var(--surface2);border-color:var(--blue)}
.nb:active{transform:scale(.88)}
.nb:disabled{opacity:.15;pointer-events:none}

#dots{display:flex;align-items:center;gap:3px;max-width:240px;overflow:hidden}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border2);cursor:pointer;flex-shrink:0;transition:background .3s,width .3s,border-radius .3s}
.dot.active{background:var(--blue);width:16px;border-radius:3px}
.dot:hover:not(.active){background:var(--text-muted)}

#sbox{position:fixed;bottom:7px;left:.8rem;display:flex;align-items:center;gap:.35rem;z-index:210}
#slbl{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--text-muted);letter-spacing:.07em}
#sinp{width:46px;padding:.25rem .45rem;border-radius:6px;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.6rem;text-align:center;outline:none;-moz-appearance:textfield;transition:.2s}
#sinp::-webkit-inner-spin-button,#sinp::-webkit-outer-spin-button{-webkit-appearance:none}
#sinp:focus{border-color:var(--blue);width:58px}

#hint{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--text-muted);letter-spacing:.08em;pointer-events:none;white-space:nowrap;opacity:1;transition:opacity 1s;z-index:210}
#hint.gone{opacity:0}

/* Photo frames */
.photo-frame{width:100%;height:100%;border-radius:12px;overflow:hidden;background:var(--photo-bg);border:1px solid var(--photo-border);display:flex;align-items:center;justify-content:center}
.photo-frame img{width:100%;height:100%;object-fit:cover;display:block}
.photo-frame.contain img{object-fit:contain}
.photo-frame .no-photo{display:flex;flex-direction:column;align-items:center;gap:.4rem;opacity:.35;pointer-events:none}
.photo-frame .no-photo svg{width:22px;height:22px;stroke:var(--blue);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.photo-frame .no-photo span{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--blue);letter-spacing:.08em}

/* ── TITLE SLIDE ── */
.s-title .card{flex-direction:row}
.title-left{flex:1;padding:2.8rem 3rem;display:flex;flex-direction:column;justify-content:center}
.title-right{width:40%;flex-shrink:0;padding:.8rem .8rem .8rem 0}
.title-event{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:1.4rem;display:flex;align-items:center;gap:.5rem}
.title-event::before{content:'';display:block;width:22px;height:1px;background:var(--blue)}
.title-h{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;font-size:clamp(2.2rem,5vw,4rem);line-height:1.05;background:linear-gradient(140deg,var(--text) 0%,var(--blue) 55%,var(--teal) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.8rem}
.title-sub{font-size:clamp(.82rem,1.5vw,.98rem);color:var(--text-muted);line-height:1.7;margin-bottom:2rem;font-family:'Cormorant Garamond',serif;font-style:italic}
.title-presenter{border-top:1px solid var(--border2);padding-top:1.4rem;display:flex;flex-direction:column;gap:.2rem}
.title-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--text)}
.title-role{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--blue);letter-spacing:.1em}
.title-org{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--text-muted);letter-spacing:.05em;margin-top:.1rem}

/* ── OPENER ── */
.s-opener .card{justify-content:center;align-items:center;text-align:center;padding:3rem 7rem}
.opener-pre{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:2rem;opacity:.75}
.opener-big{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1.8rem,4.8vw,3.8rem);font-weight:400;line-height:1.3;color:var(--text);max-width:860px;margin-bottom:1.8rem}
.opener-big strong{font-style:normal;font-weight:700;color:var(--blue);-webkit-text-fill-color:var(--blue)}
.opener-note{font-size:clamp(.88rem,1.5vw,1rem);color:var(--text-muted);font-style:italic;font-family:'Cormorant Garamond',serif}

/* ── STORY ── */
.s-story .card{flex-direction:row}
.story-photo-wrap{width:40%;flex-shrink:0;padding:.8rem 0 .8rem .8rem}
.story-content{flex:1;padding:2.4rem 2.8rem;display:flex;flex-direction:column;justify-content:center}
.story-content .tag{margin-bottom:.9rem}
.story-content .stitle{font-size:clamp(1.5rem,2.8vw,2.3rem);margin:.5rem 0}
.story-body{font-family:'Cormorant Garamond',serif;font-size:clamp(1.08rem,1.8vw,1.28rem);color:var(--text-sub);line-height:1.75;margin-top:.8rem}
.story-body em{color:var(--blue);font-style:italic}

/* ── STAT ── */
.s-stat .card{flex-direction:row}
.stat-left{flex:1;padding:2.8rem 3rem;display:flex;flex-direction:column;justify-content:center}
.stat-left .tag{margin-bottom:1.2rem}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,12vw,9rem);font-weight:700;line-height:1;color:var(--blue);letter-spacing:-.02em}
.stat-label{font-family:'Cormorant Garamond',serif;font-size:clamp(1.3rem,2.5vw,2rem);font-weight:600;color:var(--text);margin:.35rem 0 1rem;line-height:1.2}
.stat-body{font-size:clamp(.92rem,1.5vw,1.06rem);color:var(--text-sub);line-height:1.72;max-width:440px}
.stat-source{margin-top:auto;padding-top:1.4rem;font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--text-muted);letter-spacing:.04em}
.stat-right{width:38%;flex-shrink:0;padding:.8rem .8rem .8rem 0;display:flex;flex-direction:column;gap:.8rem}
.stat-photo-wrap{flex:1;min-height:0}
.mini-list{display:flex;flex-direction:column;gap:.6rem;flex-shrink:0}
.mini-item{padding:.8rem 1rem;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;gap:.8rem;align-items:flex-start}
.mini-val{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:700;color:var(--blue);min-width:48px;line-height:1;flex-shrink:0}
.mini-lbl{font-size:.83rem;color:var(--text-sub);line-height:1.4}

/* ── QUOTE ── */
.s-quote .card{flex-direction:row}
.quote-bar{width:5px;flex-shrink:0;background:linear-gradient(to bottom,var(--blue),var(--teal))}
.quote-body{flex:1;padding:3rem 4rem;display:flex;flex-direction:column;justify-content:center}
.quote-mark{font-family:'Cormorant Garamond',serif;font-size:6.5rem;line-height:.7;color:var(--blue);opacity:.16;user-select:none;margin-bottom:.9rem}
.quote-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1.4rem,3vw,2.4rem);line-height:1.4;color:var(--text);margin-bottom:1.4rem}
.quote-attr{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase}

/* ── GRID ── */
.s-grid .card{padding:2rem 2.5rem}
.s-grid .stitle{font-size:clamp(1.5rem,2.6vw,2.1rem);margin:.4rem 0 .6rem}
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;flex:1;margin-top:.5rem}
.igc{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:1.3rem 1.2rem;display:flex;flex-direction:column;gap:.55rem;transition:transform .2s,border-color .2s}
.igc:hover{transform:translateY(-3px);border-color:var(--blue)}
.igc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.igc-icon svg{width:17px;height:17px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.igc-title{font-family:'Cormorant Garamond',serif;font-size:clamp(.95rem,1.7vw,1.2rem);font-weight:700;color:var(--text);line-height:1.2}
.igc-body{font-size:clamp(.8rem,1.25vw,.94rem);color:var(--text-muted);line-height:1.55}

/* ── TWOCOL ── */
.s-twocol .card{flex-direction:row}
.tc-left{flex:1;padding:2.4rem 2.8rem;display:flex;flex-direction:column;justify-content:center}
.tc-left .tag{margin-bottom:.8rem}
.tc-left .stitle{font-size:clamp(1.4rem,2.6vw,2.1rem);margin:.5rem 0 1rem}
.tc-right{width:42%;flex-shrink:0;padding:.8rem .8rem .8rem 0}
.bullet-list{display:flex;flex-direction:column;gap:.65rem}
.bullet-item{display:flex;align-items:flex-start;gap:.8rem;padding:.8rem .95rem;border-radius:10px;background:var(--surface2);border:1px solid var(--border)}
.bullet-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:.45rem}
.bullet-text{font-size:clamp(.9rem,1.45vw,1.05rem);color:var(--text-sub);line-height:1.5}

/* ── TIMELINE ── */
.s-timeline .card{padding:2rem 2.5rem 2rem 2.8rem}
.s-timeline .stitle{font-size:clamp(1.4rem,2.5vw,2rem);margin:.4rem 0 .5rem}
.tl-wrap{display:flex;flex-direction:column;flex:1;margin-top:.7rem;position:relative;padding-left:1.8rem}
.tl-wrap::before{content:'';position:absolute;left:.55rem;top:.4rem;bottom:.4rem;width:2px;background:linear-gradient(to bottom,var(--blue),var(--teal),var(--gold));border-radius:2px}
.tl-item{display:flex;gap:1rem;align-items:flex-start;position:relative}
.tl-item+.tl-item{margin-top:.8rem}
.tl-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;position:absolute;left:-2.15rem;top:.25rem;border:2px solid var(--bg);box-shadow:0 0 7px currentColor}
.tl-content{flex:1}
.tl-label{font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.18rem}
.tl-title{font-family:'Cormorant Garamond',serif;font-size:clamp(.95rem,1.7vw,1.25rem);font-weight:700;color:var(--text);margin-bottom:.2rem}
.tl-body{font-size:clamp(.78rem,1.28vw,.92rem);color:var(--text-muted);line-height:1.55}

/* ── COMPARE ── */
.s-compare .card{padding:1.8rem 2.5rem;gap:.7rem}
.compare-hdr .stitle{font-size:clamp(1.6rem,3.2vw,2.6rem)}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;flex:1;position:relative}
.compare-vs{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:42px;height:42px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;color:var(--blue);z-index:2}
.compare-col{display:flex;flex-direction:column;gap:.5rem}
.compare-col-title{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;padding:.65rem 1rem;border-radius:9px;text-align:center;font-weight:600;margin-bottom:.15rem}
.col-a .compare-col-title{background:rgba(52,211,153,.1);color:var(--teal);border:1px solid rgba(52,211,153,.28)}
.col-b .compare-col-title{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.28)}
.compare-item{padding:.6rem .95rem;border-radius:9px;border:1px solid var(--border);background:var(--surface2);font-size:clamp(.85rem,1.35vw,.97rem);color:var(--text-sub);line-height:1.4;display:flex;align-items:center}

/* ── CTA ── */
.s-cta .card{flex-direction:row}
.cta-left{flex:1;padding:2.8rem 3.2rem;display:flex;flex-direction:column;justify-content:center}
.cta-num{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.2em;color:var(--blue);opacity:.65;margin-bottom:1.6rem}
.cta-big{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1.4rem,3.2vw,2.7rem);font-weight:600;line-height:1.3;color:var(--text);margin-bottom:1rem}
.cta-big strong{color:var(--blue);font-style:normal;-webkit-text-fill-color:var(--blue)}
.cta-body{font-size:clamp(.88rem,1.4vw,1.02rem);color:var(--text-muted);line-height:1.7;max-width:480px}
.cta-right{width:38%;flex-shrink:0;padding:.8rem .8rem .8rem 0}

/* ── GALLERY ── */
.s-gallery .card{padding:2rem 2.5rem}
.s-gallery .stitle{font-size:clamp(1.4rem,2.5vw,2rem);margin:.4rem 0 .6rem}
.gallery-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:.8rem;flex:1;margin-top:.5rem}
.gallery-slot{border-radius:10px;overflow:hidden;min-height:0}
.gallery-slot.span2{grid-row:span 2}

/* ── GALLERY2 ── */
.s-gallery2 .card{flex-direction:row;padding:0}
.g2-left{flex:1;padding:2.4rem 2.8rem;display:flex;flex-direction:column;justify-content:center}
.g2-left .tag{margin-bottom:.8rem}
.g2-left .stitle{font-size:clamp(1.4rem,2.5vw,2rem);margin:.5rem 0 1rem}
.g2-body{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,1.7vw,1.18rem);color:var(--text-sub);line-height:1.72}
.g2-body em{color:var(--blue)}
.g2-right{width:44%;flex-shrink:0;padding:.8rem .8rem .8rem 0;display:flex;flex-direction:column;gap:.7rem}
.g2-photo{flex:1;min-height:0}

/* ── HIGHLIGHT CARD ── */
.s-highlight .card{flex-direction:row}
.hl-left{flex:1;padding:2.8rem 3.2rem;display:flex;flex-direction:column;justify-content:center}
.hl-left .tag{margin-bottom:1rem}
.hl-big{font-family:'Cormorant Garamond',serif;font-size:clamp(1.3rem,3vw,2.5rem);font-weight:700;line-height:1.25;color:var(--text);margin:.5rem 0 1rem}
.hl-big em{color:var(--blue);font-style:italic;-webkit-text-fill-color:var(--blue)}
.hl-body{font-size:clamp(.9rem,1.4vw,1.05rem);color:var(--text-sub);line-height:1.7;max-width:480px}
.hl-right{width:40%;flex-shrink:0;padding:.8rem .8rem .8rem 0}

/* ── THANK YOU ── */
.s-ty .card{flex-direction:row}
.ty-left{flex:1;padding:2.8rem 3.2rem;display:flex;flex-direction:column;align-items:flex-start;justify-content:center}

  addEventListener('resize',rsz);rsz();
  const cols=['#60a5fa','#a78bfa','#34d399','#fbbf24','#93c5fd','#6ee7b7'];
  for(let i=0;i<180;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.1,op:Math.random()*.45+.07,ts:Math.random()*.025+.003,tp:Math.random()*Math.PI*2,col:cols[Math.floor(Math.random()*cols.length)]});

  draw();
})();

/* ── HELPERS ── */
const sw=document.getElementById('sw'),dotsEl=document.getElementById('dots');
document.getElementById('tn').textContent=slides.length;

  } else if(d.type==='compare'){

  sw.appendChild(el);

/* ── DOTS ── */
slides.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.addEventListener('click',()=>go(i));
  dotsEl.appendChild(d);
});

/* ── NAVIGATION ── */
let cur=0,busy=false;
function go(i){
  const tot=document.querySelectorAll('.slide').length;
  if(busy||i===cur||i<0||i>=tot)return;
  busy=true;
  const old=document.querySelector('.slide.active');
  if(old){old.classList.remove('active');old.classList.add('out');setTimeout(()=>old.classList.remove('out'),560)}
  cur=i;
  document.querySelectorAll('.slide')[cur].classList.add('active');
  document.getElementById('cn').textContent=cur+1;
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('active',j===cur));
  document.getElementById('prog').style.width=((cur/(tot-1))*100)+'%';
  upd();setTimeout(()=>busy=false,560);
}
function upd(){
  const tot=document.querySelectorAll('.slide').length;
  document.getElementById('bP').disabled=cur===0;
  document.getElementById('bF').disabled=cur===0;
  document.getElementById('bN').disabled=cur===tot-1;
  document.getElementById('bL').disabled=cur===tot-1;
}
['bP','bN','bF','bL'].forEach(id=>document.getElementById(id).addEventListener('click',()=>{
  const tot=document.querySelectorAll('.slide').length;
  if(id==='bP')go(cur-1);else if(id==='bN')go(cur+1);else if(id==='bF')go(0);else go(tot-1);
}));
document.getElementById('nzL').addEventListener('click',()=>go(cur-1));
document.getElementById('nzR').addEventListener('click',()=>go(cur+1));
document.addEventListener('keydown',e=>{
  const tot=document.querySelectorAll('.slide').length;
  if(document.activeElement===document.getElementById('sinp'))return;
  if(['ArrowRight','ArrowDown',' '].includes(e.key)){e.preventDefault();go(cur+1)}
  if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();go(cur-1)}
  if(e.key==='Home')go(0);if(e.key==='End')go(tot-1);
  if(e.key==='f'||e.key==='F')toggleFS();
});
let tx=0,ty2=0;
sw.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty2=e.touches[0].clientY},{passive:true});
sw.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty2;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>38){dx<0?go(cur+1):go(cur-1)}},{passive:true});
document.getElementById('tog').addEventListener('click',()=>{const h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark'});
function toggleFS(){if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{})}else{document.exitFullscreen()}}
document.getElementById('fsb').addEventListener('click',toggleFS);
document.addEventListener('fullscreenchange',()=>{
  const f=!!document.fullscreenElement;
  document.querySelectorAll('.ic-expand').forEach(e=>e.style.display=f?'none':'');
  document.querySelectorAll('.ic-compress').forEach(e=>e.style.display=f?'':'none');
});
const sinp=document.getElementById('sinp');
sinp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const n=parseInt(sinp.value,10);const tot=document.querySelectorAll('.slide').length;if(!isNaN(n)&&n>=1&&n<=tot)go(n-1);sinp.value='';sinp.blur()}
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.stopPropagation();
});

document.querySelectorAll('.slide')[0].classList.add('active');
document.getElementById('prog').style.width='0%';
upd();
setTimeout(()=>document.getElementById('hint').classList.add('gone'),5000);
</script>
